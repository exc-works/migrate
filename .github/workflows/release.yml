name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BINARY_NAME: sql-migrate

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: arm64
            arch_label: arm64
          - goos: darwin
            goarch: arm64
            arch_label: arm64
          - goos: darwin
            goarch: amd64
            arch_label: amd64
          - goos: linux
            goarch: amd64
            arch_label: x86
          - goos: linux
            goarch: 386
            arch_label: x32
          - goos: windows
            goarch: amd64
            arch_label: x64
          - goos: windows
            goarch: arm64
            arch_label: arm64
          - goos: windows
            goarch: 386
            arch_label: x86
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Download dependencies
        run: go mod download
      - name: Build release binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          ext=""
          if [ "${GOOS}" = "windows" ]; then
            ext=".exe"
          fi
          raw_name="${BINARY_NAME}_${GITHUB_REF_NAME}_${GOOS}_${{ matrix.arch_label }}${ext}"
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "dist/${raw_name}" ./cmd/sql-migrate
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.arch_label }}
          path: dist/*
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > checksums.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
