name: ci

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate hook scripts
        run: |
          bash -n .githooks/pre-commit
          bash -n scripts/install-git-hooks.sh
      - name: Test hook behavior
        run: ./scripts/test-pre-commit-hook.sh

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Download dependencies
        run: go mod download
      - name: Unit tests
        run: go test ./...
      - name: Vet
        run: go vet ./...

  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [postgres, mysql, mariadb, sqlite]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Download dependencies
        run: go mod download
      - name: Ensure Docker Is Healthy
        if: ${{ matrix.db != 'sqlite' }}
        run: docker info
      - name: Integration tests
        env:
          INTEGRATION_DB: ${{ matrix.db }}
        run: go test -tags=integration ./integrationtest/...

  integration-oracle:
    runs-on: ubuntu-latest
    env:
      INTEGRATION_ORACLE_DSN: ${{ secrets.INTEGRATION_ORACLE_DSN }}
    steps:
      - name: Check Oracle DSN
        id: oracle_dsn
        run: |
          if [ -n "${INTEGRATION_ORACLE_DSN:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "INTEGRATION_ORACLE_DSN is not set, skip oracle integration tests."
          fi
      - uses: actions/checkout@v6
        if: ${{ steps.oracle_dsn.outputs.available == 'true' }}
      - uses: actions/setup-go@v6
        if: ${{ steps.oracle_dsn.outputs.available == 'true' }}
        with:
          go-version-file: go.mod
      - name: Download dependencies
        if: ${{ steps.oracle_dsn.outputs.available == 'true' }}
        run: go mod download
      - name: Integration tests (oracle)
        if: ${{ steps.oracle_dsn.outputs.available == 'true' }}
        env:
          INTEGRATION_DB: oracle
        run: go test -tags=integration ./integrationtest/...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build all
        run: go build ./...
      - name: Build CLI
        run: go build ./cmd/migrate
