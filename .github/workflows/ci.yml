name: ci

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate hook scripts
        run: |
          bash -n .githooks/pre-commit
          bash -n scripts/install-git-hooks.sh
      - name: Test hook behavior
        run: ./scripts/test-pre-commit-hook.sh

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Download dependencies
        run: go mod download
      - name: Unit tests
        run: go test ./...
      - name: Vet
        run: go vet ./...

  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [postgres, mysql, mariadb, sqlite]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Download dependencies
        run: go mod download
      - name: Ensure Docker Is Healthy
        if: ${{ matrix.db != 'sqlite' }}
        run: docker info
      - name: Integration tests
        env:
          INTEGRATION_DB: ${{ matrix.db }}
        run: go test -tags=integration ./integrationtest/...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build all
        run: go build ./...
      - name: Build CLI
        run: go build ./cmd/sql-migrate
